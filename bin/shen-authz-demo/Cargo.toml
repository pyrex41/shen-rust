[package]
name = "shen-authz-demo"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
publish = false

# Prototype: combine the Shen engine (this port, run in its served / VM mode)
# with Cedar (AWS's authorization-policy language) natively in one Rust
# process. Cedar gates each request; the served Shen VM does the compute.
[[bin]]
name = "shen-authz-demo"
path = "src/main.rs"

[dependencies]
shen-cedar = { workspace = true }
cedar-policy = { workspace = true }
